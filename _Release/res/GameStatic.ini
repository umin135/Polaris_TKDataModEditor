; GameStatic.ini -- Tekken 8 version-specific magic values
; Edit this file (without recompiling) when a game update changes these values.
; Values can be written in decimal or hex (prefix with 0x).

[Cancel]
; cancel.command == GroupCancelStart  ->  group cancel list entry (move_id = group cancel index)
GroupCancelStart=0x8012
; cancel.command == GroupCancelEnd    ->  group cancel list terminator
GroupCancelEnd=0x8013
; cancel.command >= InputSeqStart     ->  input_sequence[command - InputSeqStart]
InputSeqStart=0x8014

[Requirement]
; requirement.req == this value       ->  end of requirement list
ListEnd=1100

[ExtraProp]
; extraprop.id values that trigger special behaviour
Dialogue1=0x877b
Dialogue2=0x87f8
Projectile=0x827b
Throw=0x868f
